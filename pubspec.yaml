name: godown_inventory
description: Offline Godown Inventory Management App - V1.2.0
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local database
  sqflite: ^2.3.0
  path: ^1.8.3

  # State management
  provider: ^6.1.1

  # Connectivity for sync
  connectivity_plus: ^5.0.2

  # Supabase cloud sync
  supabase_flutter: ^2.3.0

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.2

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_logo.jpg

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_logo.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#BFFCFC"
  adaptive_icon_foreground: "assets/images/app_logo.jpg"